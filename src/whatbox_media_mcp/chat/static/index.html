<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Media server chatbot</title>
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #111;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #shell {
    width: 100%;
    max-width: 720px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: #1a1a1a;
    box-shadow: 0 0 24px rgba(0,0,0,.5);
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid #2a2a2a;
    flex-shrink: 0;
  }

  header h1 { font-size: 1rem; font-weight: 600; color: #e0e0e0; }

  #logout-btn {
    background: none;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: .8rem;
    cursor: pointer;
    color: #888;
  }
  #logout-btn:hover { background: #2a2a2a; color: #e0e0e0; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: .93rem;
    line-height: 1.5;
    word-break: break-word;
  }

  .bubble.user {
    align-self: flex-end;
    background: #2563eb;
    color: #fff;
    border-bottom-right-radius: 4px;
    white-space: pre-wrap;
  }

  .bubble.assistant {
    align-self: flex-start;
    background: #252525;
    color: #d4d4d4;
    border-bottom-left-radius: 4px;
  }

  /* Markdown inside assistant bubbles */
  .bubble.assistant p          { margin-bottom: .5em; }
  .bubble.assistant p:last-child { margin-bottom: 0; }
  .bubble.assistant ul,
  .bubble.assistant ol         { margin: .4em 0 .4em 1.25em; }
  .bubble.assistant li         { margin-bottom: .2em; }
  .bubble.assistant strong     { color: #fff; }
  .bubble.assistant em         { font-style: italic; color: #bbb; }
  .bubble.assistant h1,
  .bubble.assistant h2,
  .bubble.assistant h3         { color: #fff; margin: .6em 0 .3em; font-weight: 600; }
  .bubble.assistant h1         { font-size: 1.1em; }
  .bubble.assistant h2         { font-size: 1.05em; }
  .bubble.assistant h3         { font-size: 1em; }
  .bubble.assistant code {
    background: #333;
    border-radius: 4px;
    padding: 1px 5px;
    font-family: "SF Mono", ui-monospace, monospace;
    font-size: .85em;
    color: #e0e0e0;
  }
  .bubble.assistant pre {
    background: #0d0d0d;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 10px 12px;
    margin: .5em 0;
    overflow-x: auto;
  }
  .bubble.assistant pre code { background: none; padding: 0; }
  .bubble.assistant hr {
    border: none;
    border-top: 1px solid #333;
    margin: .6em 0;
  }
  .bubble.assistant a          { color: #60a5fa; text-decoration: underline; }
  .bubble.assistant blockquote {
    border-left: 3px solid #3a3a3a;
    margin: .4em 0;
    padding-left: .75em;
    color: #888;
  }

  /* bouncing ellipsis */
  .ellipsis { display: inline-flex; gap: 4px; padding: 4px 2px; }
  .ellipsis span {
    width: 7px; height: 7px;
    background: #555;
    border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .ellipsis span:nth-child(2) { animation-delay: .2s; }
  .ellipsis span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40%           { transform: translateY(-6px); }
  }

  #input-bar {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid #2a2a2a;
    flex-shrink: 0;
    background: #1a1a1a;
  }

  #input {
    flex: 1;
    border: 1px solid #3a3a3a;
    border-radius: 20px;
    padding: 10px 16px;
    font-size: .93rem;
    outline: none;
    resize: none;
    font-family: inherit;
    line-height: 1.4;
    max-height: 120px;
    overflow-y: auto;
    background: #252525;
    color: #e0e0e0;
  }
  #input::placeholder { color: #555; }
  #input:focus { border-color: #555; }

  #send-btn {
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 10px 18px;
    font-size: .93rem;
    cursor: pointer;
    flex-shrink: 0;
    align-self: flex-end;
  }
  #send-btn:disabled { background: #2a2a2a; color: #555; cursor: default; }
  #send-btn:not(:disabled):hover { background: #3b82f6; }
</style>
</head>
<body>
<div id="shell">
  <header>
    <h1>Media server chatbot</h1>
    <button id="logout-btn">Sign out</button>
  </header>
  <div id="messages"></div>
  <div id="input-bar">
    <textarea id="input" rows="1" placeholder="Ask about your library…"></textarea>
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
  if (window.marked) {
    marked.use({ breaks: true, gfm: true });
  }

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');
  const logoutBtn  = document.getElementById('logout-btn');

  let history = JSON.parse(sessionStorage.getItem('chat_history') || '[]');

  function escapeHtml(content) {
    const div = document.createElement('div');
    div.textContent = content;
    return div.innerHTML;
  }

  function renderMarkdown(content) {
    if (!window.marked || !window.DOMPurify) {
      return escapeHtml(content);
    }
    return DOMPurify.sanitize(marked.parse(content));
  }

  // Restore prior session bubbles
  history.forEach(msg => {
    if (msg.role === 'user') {
      const text = typeof msg.content === 'string' ? msg.content
        : (msg.content.find(b => b.type === 'text') || {}).text || '';
      if (text) addBubble('user', text);
    } else if (msg.role === 'assistant') {
      const text = typeof msg.content === 'string' ? msg.content
        : Array.isArray(msg.content)
          ? msg.content.filter(b => b.type === 'text').map(b => b.text).join('\n')
          : '';
      if (text) addBubble('assistant', text);
    }
  });

  function addBubble(role, content) {
    const div = document.createElement('div');
    div.className = `bubble ${role}`;
    if (role === 'assistant') {
      div.innerHTML = renderMarkdown(content);
    } else {
      div.textContent = content;
    }
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function addEllipsis() {
    const div = document.createElement('div');
    div.className = 'bubble assistant';
    div.innerHTML = '<span class="ellipsis"><span></span><span></span><span></span></span>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function send() {
    const message = inputEl.value.trim();
    if (!message) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addBubble('user', message);
    const ellipsis = addEllipsis();

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, history }),
      });

      if (resp.status === 302 || resp.status === 401) {
        window.location.href = '/auth/login';
        return;
      }

      if (!resp.ok) {
        ellipsis.textContent = 'Something went wrong. Please try again.';
        return;
      }

      const data = await resp.json();
      history = data.history;
      sessionStorage.setItem('chat_history', JSON.stringify(history));
      ellipsis.innerHTML = renderMarkdown(data.reply);
    } catch {
      ellipsis.textContent = 'Could not reach the server. Please try again.';
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', send);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  // Auto-grow textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
  });

  logoutBtn.addEventListener('click', async () => {
    sessionStorage.removeItem('chat_history');
    await fetch('/auth/logout', { method: 'POST' });
    window.location.href = '/auth/login';
  });
</script>
</body>
</html>
